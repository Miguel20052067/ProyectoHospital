<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimarIA | Acceso clínico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-900">
    <main class="relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(56,189,248,0.22),_transparent_30%),radial-gradient(circle_at_bottom_right,_rgba(29,78,216,0.24),_transparent_30%),linear-gradient(135deg,_#e0f2fe_0%,_#f8fafc_40%,_#dbeafe_100%)]">
        </div>

        <section id="loginView" class="relative min-h-screen px-6 py-10 lg:px-10">
            <div class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-2xl items-center">
                <div class="w-full border border-slate-200/80 bg-white/88 p-8 backdrop-blur xl:p-10">
                    <div class="mb-8">
                        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-blue-700">Inicio de sesión</p>
                    </div>

                    <form id="loginForm" class="space-y-5">
                        <div>
                            <label for="email" class="mb-2 block text-sm font-semibold text-slate-700">Correo electrónico</label>
                            <input id="email" name="email" type="email" placeholder="nombre@gmail.com"
                                class="w-full border border-slate-300 bg-slate-50 px-4 py-4 text-base outline-none transition focus:border-blue-700 focus:bg-white focus:ring-4 focus:ring-blue-100"
                                required>
                        </div>

                        <div>
                            <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Contraseña</label>
                            <input id="password" name="password" type="password" placeholder="••••••••"
                                class="w-full border border-slate-300 bg-slate-50 px-4 py-4 text-base outline-none transition focus:border-blue-700 focus:bg-white focus:ring-4 focus:ring-blue-100"
                                required>
                        </div>

                        <button type="submit"
                            class="w-full bg-slate-950 px-5 py-4 text-base font-bold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200">
                            Entrar
                        </button>
                    </form>

                    <p id="loginFeedback" class="mt-4 hidden border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700"></p>
                </div>
            </div>
        </section>

    </main>

    <script src="./js/app.js"></script>
</body>

</html>
